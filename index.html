<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// three.js's Draco decoder, vendored locally (libs/draco/).
const DRACO_PATH = './libs/draco/';

// ---------------------------------------------------------------------------
// Scene — split comparison via the scissor test (à la three.js
// webgl_multiple_scenes_comparison): two scenes, each holding the same model
// decoded by one loader and centred at the origin, viewed through a shared
// camera. Left half renders the WASM scene, right half the JS scene, with a
// 1px gap between them.
// ---------------------------------------------------------------------------
const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setClearColor(0x2a3038); // shows through the 1px gap between the views
// PBR display pipeline so glTF materials/textures look correct. Khronos PBR
// Neutral tone mapping is tuned for material/product viewing — it preserves
// hue and saturation (less of the highlight desaturation ACES applies).
renderer.toneMapping = THREE.NeutralToneMapping;
renderer.toneMappingExposure = 1.0;
wrap.appendChild(renderer.domElement);

// Image-based lighting from three's RoomEnvironment, prefiltered once via PMREM
// and shared by both scenes (so the two decodes are lit identically).
const pmrem = new THREE.PMREMGenerator(renderer);
const envTexture = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const sceneWASM = new THREE.Scene();
sceneWASM.background = new THREE.Color(0x111418);
sceneWASM.environment = envTexture;
const sceneJS = new THREE.Scene();
sceneJS.background = new THREE.Color(0x111418);
sceneJS.environment = envTexture;
const scenes = { wasm: sceneWASM, js: sceneJS };

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
camera.position.set(0, 0.4, 3.5);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Fallback material for raw .drc files, which carry no embedded materials.
const drcMaterial = new THREE.MeshStandardMaterial({ color: 0xc4c8ce, metalness: 0.0, roughness: 0.55 });
const slots = { js: null, wasm: null }; // current model groups

function resize() {
  const W = innerWidth, H = innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  // Shift the camera view downward so the model sits below the top-centered UI
  // (a pure screen-space offset — the scene/models stay centered at the origin).
  camera.setViewOffset(W, H, 0, -H * 0.18, W, H);
}
addEventListener('resize', resize); resize();

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  const W = innerWidth, H = innerHeight, mid = Math.floor(W / 2);
  // Fill the whole canvas with the gap colour, then render each half clipped
  // by the scissor, leaving the centre column (mid-1) as a 1px divider.
  renderer.setScissorTest(false);
  renderer.clear();
  renderer.setScissorTest(true);
  renderer.setViewport(0, 0, W, H);
  renderer.setScissor(0, 0, mid - 1, H);
  renderer.render(sceneWASM, camera);
  renderer.setScissor(mid, 0, W - mid, H);
  renderer.render(sceneJS, camera);
})();

// Frees the GPU resources of a previously displayed object before replacing it.
function disposeObject(object) {
  object.traverse(o => {
    if (o.geometry) o.geometry.dispose();
    if (!o.material) return;
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    for (const m of mats) {
      if (m === drcMaterial) continue; // shared, keep it
      for (const key in m) {
        const v = m[key];
        if (v && v.isTexture) v.dispose();
      }
      m.dispose();
    }
  });
}

// Centers an object at the origin and scales it to unit radius, then shows it on
// the given side. Both scenes share one camera, so the two decodes line up
// exactly across the split. Takes ownership of `object` (a gltf scene or a group
// of meshes); it is wrapped so the fit transform doesn't clobber its own matrix.
function placeObject(object, side) {
  const scene = scenes[side];
  if (slots[side]) {
    scene.remove(slots[side]);
    disposeObject(slots[side]);
  }
  const box = new THREE.Box3().setFromObject(object);
  const c = box.getCenter(new THREE.Vector3());
  const s = 1 / (box.getBoundingSphere(new THREE.Sphere()).radius || 1);
  const group = new THREE.Group();
  group.add(object);
  group.scale.setScalar(s);
  group.position.set(-c.x * s, -c.y * s, -c.z * s);
  scene.add(group);
  slots[side] = group;
}

// Builds a renderable group from raw .drc geometries (no embedded materials).
function drcGroup(geometries) {
  const group = new THREE.Group();
  for (const g of geometries) {
    // glTF-Draco decode names attributes POSITION/NORMAL; three renders from
    // lowercase position/normal, so alias them for display.
    if (!g.getAttribute('position') && g.getAttribute('POSITION')) g.setAttribute('position', g.getAttribute('POSITION'));
    if (!g.getAttribute('normal') && g.getAttribute('NORMAL')) g.setAttribute('normal', g.getAttribute('NORMAL'));
    if (!g.getAttribute('normal')) g.computeVertexNormals();
    group.add(new THREE.Mesh(g, drcMaterial));
  }
  return group;
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
const $ = id => document.getElementById(id);
const status = msg => { $('status').textContent = msg; };
const fmtMs = ms => ms.toFixed(ms < 10 ? 2 : 1) + ' ms';
const fmtKB = b => (b / 1024).toFixed(1) + ' KB';
// The selected model is mirrored in the URL hash (e.g. #bunny.drc) so a view can
// be reloaded or shared. Returns the hash's model if it's a valid dropdown option.
const modelFromHash = () => {
  const name = decodeURIComponent(location.hash.slice(1));
  return [...$('model').options].some(o => o.value === name) ? name : null;
};
// Set a ratio cell to wasmVal / jsVal. Lower is better (fewer bytes / fewer ms), so
// >1× means JS wins (green) and <1× means JS loses (orange).
function setRatio(id, jsVal, wasmVal, jsCellId, wasmCellId) {
  const el = $(id);
  const jsCell = jsCellId ? $(jsCellId) : null;
  const wasmCell = wasmCellId ? $(wasmCellId) : null;
  if (jsVal == null || wasmVal == null || !jsVal || !wasmVal) {
    el.textContent = '–'; el.style.color = '';
    if (jsCell) jsCell.style.color = '';
    if (wasmCell) wasmCell.style.color = '';
    return;
  }
  if (jsVal === wasmVal) {
    el.textContent = '1.0×'; el.style.color = '#cdd6e0';
    if (jsCell) jsCell.style.color = '#cdd6e0';
    if (wasmCell) wasmCell.style.color = '#cdd6e0';
    return;
  }
  const ratio = wasmVal / jsVal;
  el.textContent = `${ratio.toFixed(1)}×`;
  const jsWins = ratio > 1;
  // Winner green, loser orange; the WASM cell takes the opposite tint of JS.
  const tint = wins => wins ? 'hsl(140, 60%, 62%)' : 'hsl(25, 80%, 62%)';
  el.style.color = tint(jsWins);
  if (jsCell) jsCell.style.color = tint(jsWins);
  if (wasmCell) wasmCell.style.color = tint(!jsWins);
}

// gzip a byte array in-browser via CompressionStream; null if unsupported.
async function gzipSize(bytes) {
  if (typeof CompressionStream === 'undefined') return null;
  const stream = new Blob([bytes]).stream().pipeThrough(new CompressionStream('gzip'));
  return (await new Response(stream).arrayBuffer()).byteLength;
}

// Fetch a resource and return both its raw and gzipped byte sizes.
async function sizeOf(url) {
  const bytes = new Uint8Array(await (await fetch(url)).arrayBuffer());
  return { raw: bytes.byteLength, gz: await gzipSize(bytes) };
}

// Decode one Draco buffer with a loader; resolves with the BufferGeometry.
// attributeIDs/attributeTypes null → default named decode (.drc); set → glTF
// unique-id decode (.glb primitives).
function decodeOne(loader, buffer, attributeIDs, attributeTypes) {
  return new Promise((resolve, reject) => {
    loader.decodeDracoFile(buffer, resolve, attributeIDs, attributeTypes, undefined, reject);
  });
}

// Walk a glTF JSON for KHR_draco_mesh_compression primitives and slice each one's
// compressed buffer out of its bufferView. getBytes(i) returns the bytes of glTF
// buffer i (the BIN chunk for .glb; a resolved data: URI for .gltf) or null if it
// isn't available, in which case that primitive is skipped.
function dracoParts(json, getBytes) {
  const parts = [];
  for (const mesh of json.meshes || []) {
    for (const prim of mesh.primitives) {
      const ext = prim.extensions && prim.extensions.KHR_draco_mesh_compression;
      if (!ext) continue;
      const bv = json.bufferViews[ext.bufferView];
      const bytes = getBytes(bv.buffer || 0);
      if (!bytes) continue;
      const slice = bytes.slice(bv.byteOffset || 0, (bv.byteOffset || 0) + bv.byteLength);
      const attributeTypes = {};
      for (const k in ext.attributes) attributeTypes[k] = 'Float32Array';
      parts.push({ buffer: slice.buffer, attributeIDs: ext.attributes, attributeTypes });
    }
  }
  return parts;
}

// Decode a glTF buffer entry to bytes. Only embedded base64 data: URIs are
// resolvable from a single dropped .gltf — external .bin files aren't available.
function decodeGLTFBuffer(b) {
  if (!b.uri || !b.uri.startsWith('data:')) return null;
  const bin = atob(b.uri.slice(b.uri.indexOf(',') + 1));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

// Resolve a model's Draco decode "parts" from its already-loaded bytes. A .drc is
// one buffer (default attributes); a .glb/.gltf yields one part per
// KHR_draco_mesh_compression primitive, decoded by its glTF unique attribute ids.
function partsFromData(name, data) {
  const lower = name.toLowerCase();
  if (lower.endsWith('.gltf')) {
    const json = JSON.parse(new TextDecoder().decode(data));
    const buffers = (json.buffers || []).map(decodeGLTFBuffer);
    return dracoParts(json, i => buffers[i]);
  }
  if (!lower.endsWith('.glb')) return [{ buffer: data, attributeIDs: null, attributeTypes: null }];
  const u8 = new Uint8Array(data);
  const dv = new DataView(data);
  const jsonLen = dv.getUint32(12, true);
  const json = JSON.parse(new TextDecoder().decode(u8.subarray(20, 20 + jsonLen)));
  const binOff = 12 + 8 + jsonLen;
  const bin = u8.subarray(binOff + 8, binOff + 8 + dv.getUint32(binOff, true));
  return dracoParts(json, i => i === 0 ? bin : null);
}

// Decode a whole model (all primitives) once; returns { ms, geometries }.
// Primitives are decoded concurrently — the way a real glTF load drives them —
// so the WASM loader's worker pool can parallelize across them instead of being
// serialized into back-to-back round-trips. The main-thread JS loader runs them
// sequentially regardless, so this only affects multi-primitive models, and
// times the same thing for both: each decodeDracoFile call to its callback.
async function decodeModel(loader, parts) {
  const t0 = performance.now();
  const geometries = await Promise.all(
    parts.map(p => decodeOne(loader, p.buffer.slice(0), p.attributeIDs, p.attributeTypes))
  );
  return { ms: performance.now() - t0, geometries };
}

// ---------------------------------------------------------------------------
// Loaders (lazily imported + measured)
// ---------------------------------------------------------------------------
let jsLoader, wasmLoader;       // raw Draco loaders (timing)
let gltfLoaderJS, gltfLoaderWASM; // full glTF loaders (visual), one per Draco decoder
const info = { js: {}, wasm: {} };

// Parse a .glb ArrayBuffer into a three.js scene (materials + textures), with
// Draco geometry decoded by the given loader's DRACOLoader.
function parseGLTF(gltfLoader, data) {
  return new Promise((resolve, reject) => gltfLoader.parse(data, '', resolve, reject));
}

async function initLoaders() {
  // A tiny model used to force each decoder to its ready state (the WASM one
  // fetches + instantiates its .wasm lazily), so "loader load" reflects the
  // real cold-start cost a user pays before the first decode.
  const warmup = await (await fetch('./samples/cube.drc')).arrayBuffer();

  // JS loader (this project's minified build — what you'd ship).
  let t0 = performance.now();
  const jsMod = await import('./build/DRACOLoader.min.js');
  jsLoader = new jsMod.DRACOLoader();
  (await decodeOne(jsLoader, warmup.slice(0), null, null)).dispose();
  info.js.load = performance.now() - t0;

  // preload() doesn't await the wasm, so force readiness with a warmup decode.
  t0 = performance.now();
  const wasmMod = await import('./libs/draco/DRACOLoader.js');
  wasmLoader = new wasmMod.DRACOLoader();
  wasmLoader.setDecoderConfig({ type: 'wasm' });
  wasmLoader.setDecoderPath(DRACO_PATH);
  wasmLoader.preload();
  (await decodeOne(wasmLoader, warmup.slice(0), null, null)).dispose();
  info.wasm.load = performance.now() - t0;

  // glTF loaders for the visual: same GLTFLoader, one driven by each Draco
  // decoder, so the rendered materials/textures are identical and only the
  // geometry decoder differs across the split.
  gltfLoaderJS = new GLTFLoader().setDRACOLoader(jsLoader);
  gltfLoaderWASM = new GLTFLoader().setDRACOLoader(wasmLoader);

  // Loader payload sizes (decoder only; three.js excluded from both). The WASM
  // loader ships as three separately-transferred files, so sum them.
  const js = await sizeOf('./build/DRACOLoader.min.js');
  const wasmParts = await Promise.all([
    sizeOf('./libs/draco/DRACOLoader.js'),
    sizeOf(DRACO_PATH + 'draco_wasm_wrapper.js'),
    sizeOf(DRACO_PATH + 'draco_decoder.wasm'),
  ]);
  info.js.gz = js.gz;
  info.wasm.gz = wasmParts.every(p => p.gz != null) ? wasmParts.reduce((a, b) => a + b.gz, 0) : null;

  const gz = b => b != null ? fmtKB(b) : 'n/a';
  $('js-gzip').textContent = gz(info.js.gz);
  $('wasm-gzip').textContent = gz(info.wasm.gz);
  setRatio('size-ratio', info.js.gz, info.wasm.gz, 'js-gzip', 'wasm-gzip');
  $('js-load').textContent = fmtMs(info.js.load);
  $('wasm-load').textContent = fmtMs(info.wasm.load);
  setRatio('load-ratio', info.js.load, info.wasm.load, 'js-load', 'wasm-load');
}

// ---------------------------------------------------------------------------
// Run a model through both loaders
// ---------------------------------------------------------------------------
let running = false;

// Decode a model's bytes through both loaders, fill the metrics table, and render
// it across the split. Shared by the sample dropdown and drag-and-drop, so it
// works from raw file bytes + a name (the name only selects the .drc/.glb/.gltf
// code path and labels the status line).
async function processModel(name, fileData) {
  if (running) return;
  running = true;
  $('model').disabled = true;
  try {
    const parts = partsFromData(name, fileData);
    if (parts.length === 0) { status(`no Draco data in ${name}`); return; }

    // --- Timing: clean Draco-only decode (no material/texture work), so the
    // table keeps measuring the decoder, not the rest of glTF assembly. ---
    status('decoding with JS loader…');
    const js = await decodeModel(jsLoader, parts);
    $('js-parse').textContent = fmtMs(js.ms);

    status('decoding with WASM loader…');
    const wasm = await decodeModel(wasmLoader, parts);
    $('wasm-parse').textContent = fmtMs(wasm.ms);

    // total = one-time loader cold-start + this model's parse.
    const jsTotal = info.js.load + js.ms;
    const wasmTotal = info.wasm.load + wasm.ms;
    $('js-total').textContent = fmtMs(jsTotal);
    $('wasm-total').textContent = fmtMs(wasmTotal);
    setRatio('parse-ratio', js.ms, wasm.ms, 'js-parse', 'wasm-parse');
    setRatio('total-ratio', jsTotal, wasmTotal, 'js-total', 'wasm-total');

    // --- Visual: render the model with its real materials/textures. glTF goes
    // through GLTFLoader (Draco geometry decoded by each side's loader); raw .drc
    // has no materials, so show its geometry under a neutral material. A .glb is
    // parsed from its bytes, a .gltf from its JSON text (embedded buffers only). ---
    const lower = name.toLowerCase();
    if (lower.endsWith('.glb') || lower.endsWith('.gltf')) {
      const gltfArg = lower.endsWith('.gltf') ? new TextDecoder().decode(fileData) : fileData;
      status('building scene (WASM)…');
      placeObject((await parseGLTF(gltfLoaderWASM, gltfArg.slice(0))).scene, 'wasm');
      status('building scene (JS)…');
      placeObject((await parseGLTF(gltfLoaderJS, gltfArg.slice(0))).scene, 'js');
    } else {
      placeObject(drcGroup(wasm.geometries), 'wasm');
      placeObject(drcGroup(js.geometries), 'js');
    }

    const n = parts.length;
    status(`done — ${name} (${n} ${n === 1 ? 'geometry' : 'geometries'})`);
  } catch (e) {
    status('error: ' + e.message);
    console.error(e);
  } finally {
    running = false;
    $('model').disabled = false;
  }
}

// Load one of the bundled samples by name (mirrored in the URL hash), then decode.
async function run(name) {
  if (running) return;
  if (location.hash.slice(1) !== name) location.hash = name;
  try {
    status(`fetching ${name}…`);
    const fileData = await (await fetch('./samples/' + name)).arrayBuffer();
    await processModel(name, fileData);
  } catch (e) {
    status('error: ' + e.message);
    console.error(e);
  }
}

// ---------------------------------------------------------------------------
// Drag and drop — load a .drc / .glb / .gltf straight from the local machine
// ---------------------------------------------------------------------------
let dragDepth = 0; // dragenter/leave fire per child element; count to avoid flicker
addEventListener('dragenter', e => { e.preventDefault(); if (dragDepth++ === 0) $('drop').classList.add('show'); });
addEventListener('dragover', e => e.preventDefault()); // required to allow a drop
addEventListener('dragleave', e => { e.preventDefault(); if (--dragDepth <= 0) { dragDepth = 0; $('drop').classList.remove('show'); } });
addEventListener('drop', async e => {
  e.preventDefault();
  dragDepth = 0;
  $('drop').classList.remove('show');
  const file = e.dataTransfer.files && e.dataTransfer.files[0];
  if (!file) return;
  if (!/\.(drc|glb|gltf)$/i.test(file.name)) { status(`unsupported file: ${file.name}`); return; }
  if (running) return;
  status(`reading ${file.name}…`);
  // A dropped file isn't a dropdown sample, so leave the URL hash untouched.
  await processModel(file.name, await file.arrayBuffer());
});

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
(async function () {
  try {
    status('loading loaders…');
    await initLoaders();
    const initial = modelFromHash() || $('model').value;
    $('model').value = initial;
    $('model').addEventListener('change', () => run($('model').value));
    // React to back/forward or a manually edited hash.
    addEventListener('hashchange', () => {
      const name = modelFromHash();
      if (name && name !== $('model').value) { $('model').value = name; run(name); }
    });
    await run(initial); // decode the model from the hash (or the default)
  } catch (e) {
    status('failed to init: ' + e.message);
    console.error(e);
  }
})();
</script>
</body>
</html>
